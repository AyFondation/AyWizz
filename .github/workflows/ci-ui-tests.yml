# Version: 2
# Path: .github/workflows/ci-ui-tests.yml
#
# CI - frontend test pipeline mirroring the backend's `ci-tests.yml`.
# Two parallel jobs :
#   - vitest    : unit + integration with coverage gate (80% line).
#   - playwright: E2E specs against a Next.js dev server.
#
# Triggered on every push/PR that touches `ay_platform_ui/**` OR the
# workflow file itself. Backend Python tests are NOT affected — they
# stay in `ci-tests.yml`.
#
# v2 (2026-05-29): bump GitHub-maintained actions to their Node 24
# majors (checkout v5, setup-node v5, upload-artifact v7, cache v5) —
# clears the Node 20 runtime deprecation warning (upload-artifact v5
# still ran on Node 20; v7 is the current Node 24 line). npm caching
# stays explicit (`cache: npm`), unchanged across v4 → v5.

name: ci-ui-tests

on:
  push:
    branches: [main]
    paths:
      - "ay_platform_ui/**"
      - ".github/workflows/ci-ui-tests.yml"
  pull_request:
    paths:
      - "ay_platform_ui/**"
      - ".github/workflows/ci-ui-tests.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: ay_platform_ui

jobs:

  vitest:
    name: lint + typecheck + vitest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 25
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: ay_platform_ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit + integration tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-coverage-${{ github.run_id }}
          path: ay_platform_ui/coverage/
          retention-days: 14

  playwright:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run after vitest so a typecheck failure doesn't waste e2e
    # CI minutes. Set to `[]` if you want them parallel.
    needs: [vitest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 25
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: ay_platform_ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ay_platform_ui/package-lock.json') }}

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: ay_platform_ui/playwright-report/
          retention-days: 14
