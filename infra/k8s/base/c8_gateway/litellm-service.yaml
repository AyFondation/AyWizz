# =============================================================================
# File: litellm-service.yaml
# Version: 1
# Path: infra/k8s/base/c8_gateway/litellm-service.yaml
# Description: ClusterIP Service for the LiteLLM proxy. Clients reach it at
#              `http://litellm:4000/v1` (the C8_GATEWAY_URL the overlays set).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: aywizz
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: c8
    app.kubernetes.io/part-of: aywizz-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: c8
  ports:
    - name: http
      port: 4000
      targetPort: http
      protocol: TCP
