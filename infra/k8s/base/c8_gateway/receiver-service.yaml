# =============================================================================
# File: receiver-service.yaml
# Version: 1
# Path: infra/k8s/base/c8_gateway/receiver-service.yaml
# Description: ClusterIP Service for the C8 cost receiver. The LiteLLM proxy
#              forwarder POSTs to `http://c8-cost-receiver:8000` (R-800-070).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: c8-cost-receiver
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c8-cost-receiver
    app.kubernetes.io/component: c8
    app.kubernetes.io/part-of: aywizz-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: c8-cost-receiver
    app.kubernetes.io/component: c8
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
