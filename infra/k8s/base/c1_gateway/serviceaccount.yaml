# =============================================================================
# File: serviceaccount.yaml
# Version: 2
# Path: infra/k8s/base/c1_gateway/serviceaccount.yaml
# Description: ServiceAccount + ClusterRole + ClusterRoleBinding for
#              Traefik. Required so Traefik can read its own IngressRoute
#              / Middleware CRDs and standard Ingress / Service /
#              Endpoints / Secret resources via the Kubernetes API.
#
#              v2 (2026-05-27): adds `nodes` (list/watch) to the core rule —
#              the Traefik v3 shared Kubernetes informer watches nodes ;
#              without the grant the informer cache never syncs and the
#              KubernetesCRD provider publishes ZERO routers (all 404).
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c1-gateway
    app.kubernetes.io/component: c1
    app.kubernetes.io/part-of: aywizz-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aywizz-traefik
  labels:
    app.kubernetes.io/name: c1-gateway
    app.kubernetes.io/component: c1
    app.kubernetes.io/part-of: aywizz-platform
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["update"]
  - apiGroups: ["traefik.io"]
    resources:
      - "ingressroutes"
      - "ingressroutetcps"
      - "ingressrouteudps"
      - "middlewares"
      - "middlewaretcps"
      - "tlsoptions"
      - "tlsstores"
      - "traefikservices"
      - "serverstransports"
      - "serverstransporttcps"
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aywizz-traefik
  labels:
    app.kubernetes.io/name: c1-gateway
    app.kubernetes.io/component: c1
    app.kubernetes.io/part-of: aywizz-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aywizz-traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: aywizz
