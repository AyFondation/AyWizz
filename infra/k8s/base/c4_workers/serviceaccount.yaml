# =============================================================================
# File: serviceaccount.yaml
# Version: 2
# Path: infra/k8s/base/c4_workers/serviceaccount.yaml
# Description: Identity for the C4 sub-agent Pods.
#                - `c4-sub-agent` (in `c4-workers`) : the SA assigned to
#                  every sub-agent Pod. Holds NO permissions ; the pod
#                  doesn't talk to the K8s API. `automountServiceAccountToken=false`
#                  is set on the pod spec anyway (defense in depth).
#
#              v2 (2026-05-27): the `c4-orchestrator` SA (the orchestrator
#              Deployment's identity, in `aywizz`) MOVED to
#              base/c4_orchestrator/serviceaccount.yaml so it travels with its
#              Deployment and exists even when this `c4_workers` layer is not
#              deployed (in-process dispatcher / dev). The rbac.yaml
#              RoleBinding here still references it by name + namespace.
#
# @relation implements:R-200-030
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: c4-sub-agent
  namespace: c4-workers
  labels:
    app.kubernetes.io/name: c4-sub-agent
    app.kubernetes.io/part-of: aywizz-platform
automountServiceAccountToken: false
