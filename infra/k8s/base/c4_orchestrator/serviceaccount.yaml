# =============================================================================
# File: serviceaccount.yaml
# Version: 1
# Path: infra/k8s/base/c4_orchestrator/serviceaccount.yaml
# Description: Identity the C4 Orchestrator Deployment runs as. Lives WITH the
#              orchestrator (in `aywizz`) so it is always created alongside the
#              Deployment that references it — independently of whether the
#              `c4_workers` sub-agent-dispatch layer is deployed.
#
#              No RBAC is attached here : the in-process dispatcher (default)
#              needs no K8s API access. When `C4_DISPATCHER=k8s`, the
#              `c4_workers` RoleBinding grants THIS SA the rights to manage
#              sub-agent Pods/Jobs in the `c4-workers` namespace.
#
# @relation implements:R-200-031
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: c4-orchestrator
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c4-orchestrator
    app.kubernetes.io/part-of: aywizz-platform
