# =============================================================================
# File: service.yaml
# Version: 1
# Path: infra/k8s/base/c13_extractor/service.yaml
# Description: C13 ClusterIP Service — fronts the c13-extractor Deployment.
#              C12 (n8n) consumes it at http://c13-extractor:8000.
#              No public exposure — C13 is internal-only, not surfaced
#              through Traefik.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: c13-extractor
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c13-extractor
    app.kubernetes.io/component: c13
    app.kubernetes.io/part-of: aywizz-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: c13-extractor
    app.kubernetes.io/component: c13
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
